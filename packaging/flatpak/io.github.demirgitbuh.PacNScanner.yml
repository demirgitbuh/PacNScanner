# Flatpak manifest for PacNScanner.
# Build:   flatpak-builder --user --install build-flatpak packaging/flatpak/io.github.demirgitbuh.PacNScanner.yml
app-id: io.github.demirgitbuh.PacNScanner
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: pacnscanner
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Raw-socket / ARP scanning needs elevated host capabilities and is therefore
  # unavailable in the sandboxed Flatpak; TCP/ICMP discovery works normally.
modules:
  - name: pacnscanner
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DPACN_BUILD_TESTS=OFF
      - -DPACN_WITH_NPCAP=OFF
    sources:
      - type: dir
        path: ../..
