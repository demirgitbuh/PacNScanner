name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-14 ]
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          cache: true

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DPACN_WITH_NPCAP=OFF
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --build-config Release

      - name: clang-tidy (informational)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y clang-tidy
          find src -name '*.cpp' | xargs -I{} clang-tidy -p build {} || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format cppcheck

      - name: clang-format (informational)
        continue-on-error: true
        run: |
          find src tests -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

      - name: cppcheck (informational)
        continue-on-error: true
        run: |
          cppcheck --enable=warning,portability,performance \
            --inline-suppr --std=c++20 --quiet \
            --suppress=missingIncludeSystem src
