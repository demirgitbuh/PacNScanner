<?xml version="1.0" encoding="UTF-8"?>
<!--
  PacNScanner official logo.
  Fixed palette: turquoise #4FC4DC + white #FFFFFF. Do not recolor.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"
     fill="none" stroke-linejoin="round">
  <title>PacNScanner</title>

  <!-- Starburst petals -->
  <g fill="#4FC4DC">
    <g>
      <rect x="222" y="34" width="68" height="200" rx="24"/>
      <rect x="222" y="34" width="68" height="200" rx="24" transform="rotate(45 256 256)"/>
      <rect x="222" y="34" width="68" height="200" rx="24" transform="rotate(90 256 256)"/>
      <rect x="222" y="34" width="68" height="200" rx="24" transform="rotate(135 256 256)"/>
      <rect x="222" y="34" width="68" height="200" rx="24" transform="rotate(180 256 256)"/>
      <rect x="222" y="34" width="68" height="200" rx="24" transform="rotate(225 256 256)"/>
      <rect x="222" y="34" width="68" height="200" rx="24" transform="rotate(270 256 256)"/>
      <rect x="222" y="34" width="68" height="200" rx="24" transform="rotate(315 256 256)"/>
    </g>
    <g transform="rotate(22.5 256 256)">
      <rect x="226" y="58" width="60" height="170" rx="22"/>
      <rect x="226" y="58" width="60" height="170" rx="22" transform="rotate(45 256 256)"/>
      <rect x="226" y="58" width="60" height="170" rx="22" transform="rotate(90 256 256)"/>
      <rect x="226" y="58" width="60" height="170" rx="22" transform="rotate(135 256 256)"/>
      <rect x="226" y="58" width="60" height="170" rx="22" transform="rotate(180 256 256)"/>
      <rect x="226" y="58" width="60" height="170" rx="22" transform="rotate(225 256 256)"/>
      <rect x="226" y="58" width="60" height="170" rx="22" transform="rotate(270 256 256)"/>
      <rect x="226" y="58" width="60" height="170" rx="22" transform="rotate(315 256 256)"/>
    </g>
  </g>

  <!-- Network switch -->
  <!-- top face (drawn first, bottom edge covered by the front body) -->
  <polygon points="172,252 340,252 314,206 198,206" fill="#4FC4DC"
           stroke="#FFFFFF" stroke-width="11"/>
  <!-- front body -->
  <rect x="146" y="250" width="220" height="74" rx="16" fill="#4FC4DC"
        stroke="#FFFFFF" stroke-width="11"/>
  <!-- RJ45 ports -->
  <g fill="#FFFFFF">
    <path d="M168,272 L168,302 L194,302 L194,272 L186,272 L186,264 L176,264 L176,272 Z"/>
    <path d="M204,272 L204,302 L230,302 L230,272 L222,272 L222,264 L212,264 L212,272 Z"/>
    <path d="M240,272 L240,302 L266,302 L266,272 L258,272 L258,264 L248,264 L248,272 Z"/>
    <path d="M276,272 L276,302 L302,302 L302,272 L294,272 L294,264 L284,264 L284,272 Z"/>
    <path d="M312,272 L312,302 L338,302 L338,272 L330,272 L330,264 L320,264 L320,272 Z"/>
  </g>
</svg>
